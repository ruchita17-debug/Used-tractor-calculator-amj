<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Tractor Calculator</title>
    <script>
        function calculateEMI() {
            const principal = parseFloat(document.getElementById('principal').value);
            const rate = parseFloat(document.getElementById('rate').value)/100 / 12;
            const years = parseFloat(document.getElementById('years').value);
            const months = years * 12;
            const emi = (principal * rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
            document.getElementById('emiResult').innerText = 'EMI: ' + emi.toFixed(2);
        }

        function calculateDepreciation() {
            const principal = parseFloat(document.getElementById('principal').value);
            const years = parseFloat(document.getElementById('years').value);
            const depreciationRate = 0.15; // Assuming a 15% depreciation rate
            const depreciatedValue = principal * Math.pow(1 - depreciationRate, years);
            document.getElementById('depreciationResult').innerText = 'Depreciated Value: ' + depreciatedValue.toFixed(2);
        }

        function calculate() {
            calculateEMI();
            calculateDepreciation();
        }
    </script>
</head>
<body>
    <h1>Used Tractor Calculator</h1>
    <div>
        <label for="principal">Loan Amount:</label>
        <input type="number" id="principal" required>
    </div>
    <div>
        <label for="rate">Rate of Interest (%):</label>
        <input type="number" id="rate" required>
    </div>
    <div>
        <label for="years">Loan Tenure (Years):</label>
        <input type="number" id="years" required>
    </div>
    <button onclick="calculate()">Calculate EMI and Depreciation</button>
    <h2 id="emiResult"></h2>
    <h2 id="depreciationResult"></h2>
</body>
</html>
