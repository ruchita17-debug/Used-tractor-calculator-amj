<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Tractor Loan Calculator</title>
</head>
<body>
    <div class="container">
        <h1>Tractor Loan Calculator</h1>
        <img src="tractor.jpg" alt="Tractor Image" class="tractor-image">
        <form id="calculatorForm">
            <div class="form-group">
                <label for="invoiceAmount">Invoice Amount:</label>
                <input type="number" id="invoiceAmount" required />
            </div>
            <div class="form-group">
                <label for="yearOfManufacture">Year of Manufacture:</label>
                <input type="number" id="yearOfManufacture" required min="2000" max="2026" />
            </div>
            <div class="form-group">
                <label for="loanAmount">Estimated Loan Amount:</label>
                <input type="text" id="loanAmount" disabled />
            </div>
            <div class="form-group">
                <label for="interestRate">Rate of Interest (%):</label>
                <input type="number" id="interestRate" required />
            </div>
            <div class="form-group">
                <label for="loanPeriod">Loan Period (Years):</label>
                <input type="number" id="loanPeriod" required min="1" max="30" />
            </div>
            <button type="button" id="calculateBtn">Calculate EMI</button>
        </form>
        <div id="results" class="results"></div>
    </div>
    <script>
        document.getElementById('calculateBtn').addEventListener('click', function () {
            const invoiceAmount = parseFloat(document.getElementById('invoiceAmount').value);
            const yearOfManufacture = parseInt(document.getElementById('yearOfManufacture').value);
            const currentYear = new Date().getFullYear();
            const ageOfTractor = currentYear - yearOfManufacture;
            let depreciationRate = 0;
            if (ageOfTractor < 1) depreciationRate = 0;
            else if (ageOfTractor === 1) depreciationRate = 20;
            else if (ageOfTractor === 2) depreciationRate = 25;
            else if (ageOfTractor >= 3 && ageOfTractor <= 13) depreciationRate = 25 + (ageOfTractor - 2) * 5;
            else {
                alert('No tractors older than 13 years are allowed.');
                return;
            }
            const depreciatedValue = invoiceAmount * (1 - (depreciationRate / 100));
            document.getElementById('loanAmount').value = depreciatedValue.toFixed(2);
            const interestRate = parseFloat(document.getElementById('interestRate').value)/100 / 12;
            const loanPeriod = parseInt(document.getElementById('loanPeriod').value) * 12;
            const emi = (depreciatedValue * interestRate * Math.pow(1 + interestRate, loanPeriod)) / (Math.pow(1 + interestRate, loanPeriod) - 1);
            const totalAmount = emi * loanPeriod;
            const totalInterest = totalAmount - depreciatedValue;
            document.getElementById('results').innerHTML = `<h2>EMI: ${emi.toFixed(2)}</h2><h3>Total Amount Payable: ${totalAmount.toFixed(2)}</h3><h3>Total Interest Payable: ${totalInterest.toFixed(2)}</h3>`;
        });
    </script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        .results {
            margin-top: 20px;
            text-align: center;
        }
        .tractor-image {
            width: 100%;
            height: auto;
        }
    </style>
</body>
</html>
