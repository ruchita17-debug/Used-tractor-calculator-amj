<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Tractor Calculator</title>
    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .calculator {
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border: 2px solid #333;
            border-radius: 10px;
            background: white;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        h2 {
            color: #555;
            border-bottom: 2px solid #74ebd5;
            padding-bottom: 10px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border: 2px solid #74ebd5;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 20px 0 10px 0;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.9;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 5px;
            display: none;
        }
        .result-item {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-left: 4px solid #74ebd5;
        }
        .result-label {
            color: #666;
            font-size: 14px;
        }
        .result-value {
            color: #333;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h1>🚜 Used Tractor Calculator</h1>
    
    <h2>Step 1: Tractor Details</h2>
    <label for="invoice">Invoice Amount (₹):</label>
    <input type="number" id="invoice" placeholder="Enter purchase price" required>

    <label for="year">Year of Manufacture:</label>
    <input type="number" id="year" min="2000" max="2026" placeholder="e.g., 2020" required>

    <h2>Step 2: Loan Details</h2>
    <label for="interest">Rate of Interest (% per annum):</label>
    <input type="number" id="interest" placeholder="e.g., 10" required>

    <label for="period">Loan Period (Years):</label>
    <input type="number" id="period" placeholder="e.g., 5" required>

    <button onclick="calculate()">Calculate EMI</button>

    <div id="result">
        <h2>Results</h2>
        <div class="result-item">
            <div class="result-label">Tractor Age</div>
            <div class="result-value" id="ageResult">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">Depreciation Rate (%)</div>
            <div class="result-value" id="deprecResult">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">Estimated Loan Amount (₹)</div>
            <div class="result-value" id="loanResult">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">Monthly EMI (₹)</div>
            <div class="result-value" id="emiResult">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">Total Amount Payable (₹)</div>
            <div class="result-value" id="totalResult">-</div>
        </div>
        <div class="result-item">
            <div class="result-label">Total Interest Payable (₹)</div>
            <div class="result-value" id="interestResult">-</div>
        </div>
    </div>
</div>

<script>
function calculate() {
    const invoice = parseFloat(document.getElementById('invoice').value);
    const year = parseInt(document.getElementById('year').value);
    const currentYear = 2026;
    const age = currentYear - year;

    // Validation
    if (!invoice || !year) {
        alert('Please fill all fields');
        return;
    }

    if (year > currentYear) {
        alert('Future manufacture date not allowed!');
        return;
    }

    if (age > 13) {
        alert('Tractors older than 13 years are not allowed!');
        return;
    }

    // Depreciation calculation
    let depreciationRate = 0;
    if (age === 0) {
        depreciationRate = 0;
    } else if (age === 1) {
        depreciationRate = 20;
    } else if (age === 2) {
        depreciationRate = 25;
    } else if (age >= 3 && age <= 13) {
        depreciationRate = 25 + (age - 2) * 5;
    }

    const depreciation = invoice * (depreciationRate / 100);
    const estimatedValue = invoice - depreciation;

    // EMI calculation
    const interestRate = parseFloat(document.getElementById('interest').value) / 100 / 12;
    const loanPeriod = parseInt(document.getElementById('period').value) * 12;

    let monthlyEMI = 0;
    if (interestRate === 0) {
        monthlyEMI = estimatedValue / loanPeriod;
    } else {
        monthlyEMI = (estimatedValue * interestRate * Math.pow(1 + interestRate, loanPeriod)) / (Math.pow(1 + interestRate, loanPeriod) - 1);
    }

    const totalPayment = monthlyEMI * loanPeriod;
    const totalInterest = totalPayment - estimatedValue;

    // Display results
    document.getElementById('ageResult').textContent = age + ' years';
    document.getElementById('deprecResult').textContent = depreciationRate + '%';
    document.getElementById('loanResult').textContent = '₹ ' + estimatedValue.toFixed(2);
    document.getElementById('emiResult').textContent = '₹ ' + monthlyEMI.toFixed(2);
    document.getElementById('totalResult').textContent = '₹ ' + totalPayment.toFixed(2);
    document.getElementById('interestResult').textContent = '₹ ' + totalInterest.toFixed(2);
    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
